<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página principal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.foto {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #000;
    margin: auto;
    transition: 0.3s;
}

.foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card {
    border: none;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.card:hover .foto {
    transform: scale(1.05);
}

.hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.banner {
    background: #111;
    color: white;
    text-align: center;
    padding: 40px 20px;
}
</style>
</head>

<body>

<div class="container-fluid">

<!-- HEADER -->
<div class="row align-items-stretch bg-info">

    <!-- IMAGEN -->
    <div class="col-md-4 p-0">
        <img class="hero-img" src="https://postersbase.com/cdn/shop/articles/kanye-west_6a1e735a-5683-4da6-ae1d-2562f2c25af6.png?v=1716304046">
    </div>

    <!-- BANNER + NAV -->
    <div class="col-md-8 p-0 d-flex flex-column">

        <!-- BANNER -->
        <div class="banner">
            <h1 class="display-3 fw-bold mb-2">
                Ecua<span class="text-danger">S</span>port
            </h1>
            <p class="lead mb-0">Tu tienda deportiva de confianza</p>
        </div>

        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="menuNav">
                    <ul class="navbar-nav">

                        <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Empresa</a></li>

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Catálogos</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Productos</a></li>
                                <li><a class="dropdown-item" href="#">Servicios</a></li>
                            </ul>
                        </li>

                        <li class="nav-item"><a class="nav-link" href="#">Contactos</a></li>

                    </ul>
                </div>

            </div>
        </nav>

    </div>
</div>

<!-- BODY -->
<div class="row mt-3">

    <div class="col-md-3 bg-secondary p-3">

        <div class="list-group">
            <a href="#" class="list-group-item list-group-item-action vermujer">Calzado de mujer</a>
            <a href="#" class="list-group-item list-group-item-action verniño">Calzado de niño</a>
            <a href="#" class="list-group-item list-group-item-action verropai">Ropa infantil</a>
            <a href="#" class="list-group-item list-group-item-action verropad">Ropa deportiva</a>
        </div>

    </div>

    <div class="col-md-9 bg-secondary p-3 visor">
        <h5></h5>
    </div>

</div>

<!-- TEAM -->
<div class="row bg-dark text-white py-5">

    <div class="container">
        <h2 class="text-center mb-5">👔 Equipo Directivo</h2>

        <div class="row g-4 text-center">

            <div class="col-md-4">
                <div class="card p-4">
                    <div class="foto">
                        <img src="https://randomuser.me/api/portraits/men/32.jpg">
                    </div>
                    <h5 class="mt-3">Carlos Pérez</h5>
                    <p class="text-muted">Gerente</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4">
                    <div class="foto">
                        <img src="https://randomuser.me/api/portraits/women/44.jpg">
                    </div>
                    <h5 class="mt-3">Laura Gómez</h5>
                    <p class="text-muted">Secretaria</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4">
                    <div class="foto">
                        <img src="https://randomuser.me/api/portraits/men/65.jpg">
                    </div>
                    <h5 class="mt-3">Andrés Ruiz</h5>
                    <p class="text-muted">Fundador</p>
                </div>
            </div>

        </div>
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/jquery.js"></script>
<script src="./js/index.js"></script>

</body>
</html>
